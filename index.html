<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  :root{
    --void: #1a0b2e;
    --deep: #2d1654;
    --royal: #5b2a86;
    --accent: #a855f7;
    --gold: #ffc94d;
    --cream: #f7f1ff;
    --paper: #fdfaff;
    --text: #2a1845;
    --muted: #8b7aa8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Outfit', sans-serif;
    background:var(--cream);
    color:var(--text);
    overflow-x:hidden;
  }
  ::selection{background:var(--gold); color:var(--void);}

  /* ---------- TOP BAR ---------- */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 24px;
    background:rgba(26,11,46,0.55);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .topbar .brand{
    display:flex; align-items:center; gap:10px;
    color:var(--cream);
    font-family:'Playfair Display', serif;
    font-weight:700;
    letter-spacing:0.04em;
    font-size:1rem;
  }
  .topbar img{height:34px; width:34px; border-radius:50%; object-fit:cover;}
  .topbar a{
    color:var(--gold);
    text-decoration:none;
    font-size:0.78rem;
    font-weight:600;
    letter-spacing:0.12em;
    text-transform:uppercase;
    border:1px solid var(--gold);
    padding:8px 16px;
    border-radius:999px;
    transition:all .25s ease;
    white-space:nowrap;
  }
  .topbar a:hover{background:var(--gold); color:var(--void);}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    overflow:hidden;
    background:var(--void);
  }
  .hero-bg{
    position:absolute; inset:0;
    background-image:url('banner.jpg');
    background-size:cover;
    background-position:center 20%;
    filter:saturate(1.05);
    transform:scale(1.04);
    animation:slowzoom 28s ease-in-out infinite alternate;
  }
  @keyframes slowzoom{ to{ transform:scale(1.12); } }
  .hero-bg::after{
    content:'';
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(26,11,46,0.15) 0%, rgba(26,11,46,0.35) 45%, rgba(26,11,46,0.96) 100%),
      linear-gradient(90deg, rgba(45,22,84,0.55) 0%, rgba(26,11,46,0.15) 45%, rgba(26,11,46,0.15) 55%, rgba(45,22,84,0.55) 100%);
  }
  .hero-content{
    position:relative; z-index:2;
    width:100%;
    max-width:880px;
    padding:0 24px 64px;
    text-align:center;
    color:var(--cream);
  }
  .hero-eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    font-size:0.72rem; letter-spacing:0.35em; text-transform:uppercase;
    color:var(--gold); font-weight:600;
    margin-bottom:18px;
    opacity:0; animation:fadeUp .9s ease forwards .2s;
  }
  .hero-eyebrow::before, .hero-eyebrow::after{
    content:''; display:block; width:30px; height:1px; background:var(--gold);
  }
  .hero h1{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(3rem, 11vw, 7rem);
    line-height:0.95;
    letter-spacing:-0.01em;
    text-shadow:0 8px 40px rgba(0,0,0,0.5);
    opacity:0; animation:fadeUp 1s ease forwards .35s;
  }
  .hero h1 em{
    font-style:italic;
    font-weight:600;
    color:var(--gold);
    display:block;
    font-size:0.45em;
    letter-spacing:0.3em;
    text-transform:uppercase;
    margin-top:0.3em;
  }
  .hero p.sub{
    margin-top:22px;
    font-size:clamp(0.95rem, 2vw, 1.15rem);
    color:rgba(247,241,255,0.85);
    max-width:560px;
    margin-left:auto; margin-right:auto;
    line-height:1.7;
    font-weight:300;
    opacity:0; animation:fadeUp 1s ease forwards .5s;
  }
  .hero-meta{
    margin-top:34px;
    display:flex; gap:14px; flex-wrap:wrap; justify-content:center;
    opacity:0; animation:fadeUp 1s ease forwards .65s;
  }
  .hero-meta .pill{
    border:1px solid rgba(255,201,77,0.4);
    background:rgba(255,255,255,0.04);

    padding:10px 22px;
    font-size:0.8rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--cream);
  }
  .hero-meta .pill b{ color:var(--gold); font-weight:800; }
  .scroll-cue{
    position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
    z-index:2; color:var(--cream); opacity:0.6;
    font-size:0.65rem; letter-spacing:0.3em; text-transform:uppercase;
    display:flex; flex-direction:column; align-items:center; gap:8px;

    opacity:0;

  @keyframes fadeUp{ from{opacity:0; transform:translateY(24px);} to{opacity:1; transform:translateY(0);} }
  @keyframes bob{ 0%,100%{transform:translate(-50%,0);} 50%{transform:translate(-50%,8px);} }

  /* ---------- SECTION HEADERS ---------- */
  .section{
    padding:100px 24px;
    max-width:1200px;
    margin:0 auto;
  }
  .section-head{
    text-align:center;
    margin-bottom:64px;
  }
  .section-head .tag{
    font-size:0.72rem; letter-spacing:0.4em; text-transform:uppercase;
    color:var(--accent); font-weight:700; margin-bottom:14px; display:block;
  }
  .section-head h2{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(2.2rem, 5vw, 3.6rem);

  .section-head p{

    font-size:1rem;

  /* ---------- VOTING ---------- */
  .vote-status{
    text-align:center;
    margin:-40px auto 56px;
    max-width:480px;
    padding:14px 24px;
    border-radius:14px;
    background:linear-gradient(135deg, rgba(168,85,247,0.12), rgba(255,201,77,0.10));

    font-size:0.85rem;
    color:var(--royal);
    font-weight:600;
    letter-spacing:0.02em;

  .vote-status.voted{

    border-color:var(--gold);
    color:#7a4f00;
  }

  .contestants{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(340px, 1fr));
    gap:40px;
  }
  .card{

    background:var(--void);
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 20px 50px -20px rgba(45,22,84,0.55);

  .card:hover{ transform:translateY(-8px); box-shadow:0 28px 60px -18px rgba(91,42,134,0.65); }

  /* --- FOUR IMAGES GRID (spaced, responsive, each contestant gets 4 images) --- */
  .card-imgs{
    position: relative;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    background: rgba(0,0,0,0.2);
    padding: 12px;

  .card-imgs img{

    aspect-ratio: 1 / 1;

    border-radius: 16px;
    transition: transform 0.3s ease, filter 0.2s;

    box-shadow: 0 6px 14px -4px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,201,77,0.2);

    transform: scale(1.02);
    filter: brightness(1.08);

  .runway-fill{
    position:absolute; inset:0 auto 0 0;
    width:0%;
    border-radius:999px;

  .runway-fill::after{
    content:'';
    position:absolute; top:0; right:0; bottom:0; width:14px;
    background:rgba(255,255,255,0.85);
    filter:blur(4px);
  }
  .vote-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    font-size:0.85rem;
    color:rgba(247,241,255,0.75);

  .vote-count{
    font-weight:800;
    color:var(--cream);

  .vote-pct{ color:var(--gold); font-weight:800; }

  .vote-btn{
    margin-top:10px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:44px;
    background:linear-gradient(135deg, var(--accent), var(--royal));
    color:var(--cream);
    font-family:'Outfit', sans-serif;
    font-weight:700;
    font-size:0.85rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    cursor:pointer;
    transition:transform .2s ease, box-shadow .2s ease, background .3s ease;
    box-shadow:0 8px 22px -8px rgba(168,85,247,0.6);
  }
  .vote-btn:hover:not(:disabled){ transform:translateY(-3px); box-shadow:0 12px 30px -8px rgba(168,85,247,0.8); background:linear-gradient(135deg, #bd6aff, #8735db);}
  .vote-btn:active:not(:disabled){ transform:translateY(0); }
  .vote-btn:disabled{
    background:rgba(255,255,255,0.08);
    color:rgba(247,241,255,0.4);
    cursor:default;
    box-shadow:none;
  }
  .vote-btn.voted-this{
    background:linear-gradient(135deg, var(--gold), #ffbb2e);
    color:var(--void);
    box-shadow:0 8px 24px -8px rgba(255,201,77,0.8);
  }

  /* FOOTER */
  footer{
    background:linear-gradient(180deg, var(--void), var(--deep));
    color:rgba(247,241,255,0.7);
    text-align:center;
    padding:64px 24px 48px;
    margin-top: 20px;

  footer .flogo{ height:56px; width:56px; border-radius:50%; object-fit:cover; margin-bottom:18px; border: 2px solid var(--gold);}
  footer h3{
    font-family:'Playfair Display', serif;
    color:var(--cream);
    font-size:1.3rem;
    letter-spacing:0.06em;
    margin-bottom:8px;
  }
  footer p{ font-size:0.85rem; max-width:440px; margin:0 auto; line-height:1.7;}
  footer .tagline{
    margin-top:22px;
    font-size:0.7rem;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--gold);
  }

  @media (max-width:560px){
    .section{ padding:70px 18px; }
    .card-body h3{ font-size:1.3rem; }
    .card-number{ font-size:1.9rem; top:12px; left:12px; }
  }
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCROYQJm3EVl4DVUYGJTwtXx9ZC74s-OL8",
    authDomain: "nases-fashion-week.firebaseapp.com",
    databaseURL: "https://nases-fashion-week-default-rtdb.firebaseio.com",
    projectId: "nases-fashion-week",
    storageBucket: "nases-fashion-week.firebasestorage.app",
    messagingSenderId: "710026730975",
    appId: "1:710026730975:web:10a398bf86654facd2f86a",
    measurementId: "G-83BL64VXDH"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const IDS = ['c1','c2','c3','c4'];
  const VOTED_KEY = 'nases_fashionweek_voted';
  const votesRef = ref(db, 'fashionWeekVotes');

  // Render function: updates vote counts, percentages, progress bars, button states & status message
  function render(counts, votedFor) {
    const safe = { c1:0, c2:0, c3:0, c4:0, ...counts };
    const total = IDS.reduce((sum, id) => sum + (safe[id] || 0), 0);

    IDS.forEach(id => {
      const count = safe[id] || 0;
      const pct = total > 0 ? Math.round((count / total) * 100) : 0;
      
      const countSpan = document.querySelector(`[data-count="${id}"]`);
      const pctSpan = document.querySelector(`[data-pct="${id}"]`);
      const fillDiv = document.querySelector(`[data-fill="${id}"]`);
      if (countSpan) countSpan.textContent = count;
      if (pctSpan) pctSpan.textContent = pct + '%';
      if (fillDiv) fillDiv.style.width = pct + '%';

      const btn = document.querySelector(`[data-vote="${id}"]`);
      if (btn) {
        if (votedFor) {
          btn.disabled = true;
          if (id === votedFor) {
            btn.textContent = '✓ YOUR VOTE ✓';
            btn.classList.add('voted-this');
          } else {
            btn.textContent = 'VOTE CAST';
            btn.classList.remove('voted-this');
          }
        } else {
          btn.disabled = false;
          btn.textContent = `VOTE CONTESTANT ${id.slice(1)}`;
          btn.classList.remove('voted-this');
        }
      }
    });

    const statusDiv = document.getElementById('voteStatus');
    if (statusDiv) {
      if (votedFor) {
        statusDiv.textContent = `✨ You voted! ${total} total vote${total === 1 ? '' : 's'} so far. Live results below. ✨`;
        statusDiv.classList.add('voted');
      } else {
